<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema EDUS - Acceso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">EDUS - Gestión de Citas</a>
        </div>
    </nav>

    <main class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header text-center py-3">
                        <h4 class="mb-0" id="form-title">Iniciar Sesión</h4>
                    </div>
                    <div class="card-body p-4">
                        <div id="alert-container"></div>
                        
                        <!-- Login Form -->
                        <form id="login-form">
                            <div class="mb-3">
                                <label for="login-email" class="form-label high-contrast-text">Correo Electrónico</label>
                                <input type="email" class="form-control" id="login-email" required>
                            </div>
                            <div class="mb-4">
                                <label for="login-password" class="form-label high-contrast-text">Contraseña</label>
                                <input type="password" class="form-control" id="login-password" required>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary" id="btn-login">Ingresar</button>
                            </div>
                            <div class="text-center mt-3">
                                <a href="#" id="toggle-register" class="text-decoration-none">¿No tiene cuenta? Regístrese aquí</a>
                            </div>
                        </form>

                        <!-- Register Form (Hidden by default) -->
                        <form id="register-form" style="display: none;">
                            <div class="mb-3">
                                <label for="reg-identification" class="form-label high-contrast-text">Cédula</label>
                                <input type="text" class="form-control" id="reg-identification" required>
                            </div>
                            <div class="row mb-3">
                                <div class="col">
                                    <label for="reg-firstname" class="form-label high-contrast-text">Nombre</label>
                                    <input type="text" class="form-control" id="reg-firstname" required>
                                </div>
                                <div class="col">
                                    <label for="reg-lastname" class="form-label high-contrast-text">Apellidos</label>
                                    <input type="text" class="form-control" id="reg-lastname" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="reg-email" class="form-label high-contrast-text">Correo Electrónico</label>
                                <input type="email" class="form-control" id="reg-email" required>
                            </div>
                            <div class="mb-4">
                                <label for="reg-password" class="form-label high-contrast-text">Contraseña</label>
                                <input type="password" class="form-control" id="reg-password" required>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-success" id="btn-register">Completar Registro</button>
                            </div>
                            <div class="text-center mt-3">
                                <a href="#" id="toggle-login" class="text-decoration-none">¿Ya tiene cuenta? Inicie sesión</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- jQuery and Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/auth.js"></script>
</body>
</html>
